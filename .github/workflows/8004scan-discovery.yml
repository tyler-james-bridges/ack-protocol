name: 8004scan ACK Discovery

on:
  schedule:
    - cron: '15 8,20 * * *' # Twice daily: 8:15 and 20:15 UTC (1:15am / 1:15pm MST)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  discovery-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run 8004scan discovery tests
        run: npx playwright test tests/8004scan-discovery.spec.ts --config=playwright.external.config.ts --reporter=list,html

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 8004scan-discovery-report
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Upload report to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Job summary
        if: always()
        run: |
          {
            echo "## 8004scan ACK Discovery Check"
            echo ""
            if [ "${{ job.status }}" = "success" ]; then
              echo "✅ All checks passed - ACK is searchable and viewable on 8004scan"
            else
              echo "❌ One or more discovery checks failed"
            fi
            echo ""
            echo "### Test Results"
            echo ""
            echo "| Test | Status |"
            echo "|------|--------|"
            echo "| Search results (all chains) | ${{ job.status == 'success' && '✅' || '❌' }} |"
            echo "| Agent page - Abstract (#606) | ${{ job.status == 'success' && '✅' || '❌' }} |"
            echo "| Agent page - Base (#19125) | ${{ job.status == 'success' && '✅' || '❌' }} |"
            echo "| Agent page - Ethereum (#26424) | ${{ job.status == 'success' && '✅' || '❌' }} |"
            echo "| Search → agent navigation | ${{ job.status == 'success' && '✅' || '❌' }} |"
            echo ""
            echo "📊 [View Full HTML Report](https://tyler-james-bridges.github.io/ack-protocol/)"
            echo ""
            echo "📎 Screenshots and traces available in the uploaded artifacts"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-report:
    needs: discovery-check
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
