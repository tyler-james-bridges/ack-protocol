name: 8004scan ACK Discovery

on:
  schedule:
    - cron: '15 8,20 * * *' # Twice daily: 8:15 and 20:15 UTC (1:15am / 1:15pm MST)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  discovery-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run 8004scan discovery tests
        id: tests
        continue-on-error: true
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-report.json
        run: npx playwright test tests/8004scan-discovery.spec.ts --config=playwright.external.config.ts --reporter=list,json

      - name: Push screenshots to hosting branch
        if: always()
        run: |
          # Collect all screenshots into a flat directory
          mkdir -p /tmp/screenshots
          if [ -d "test-results" ]; then
            find test-results -name "*.png" | while read -r img; do
              # Create a flat filename from the path: dir--filename.png
              dir=$(basename "$(dirname "$img")")
              file=$(basename "$img")
              cp "$img" "/tmp/screenshots/${dir}--${file}"
            done
          fi

          # Push to orphan branch (overwrites each run)
          cd /tmp/screenshots
          if [ "$(ls *.png 2>/dev/null | wc -l)" -gt 0 ]; then
            git init
            git checkout -b test-screenshots
            git add .
            git -c user.name="github-actions" -c user.email="actions@github.com" \
              commit -m "Screenshots from run ${{ github.run_id }}"
            git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
            git push origin test-screenshots --force
          fi

      - name: Generate visual job summary
        if: always()
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const summaryFile = process.env.GITHUB_STEP_SUMMARY;
          const testResultsDir = 'test-results';
          const testOutcome = '${{ steps.tests.outcome }}';
          const repo = '${{ github.repository }}';
          const runId = '${{ github.run_id }}';

          let summary = '';

          // Header
          if (testOutcome === 'success') {
            summary += '## \u2705 8004scan ACK Discovery - All Checks Passed\n\n';
          } else {
            summary += '## \u274c 8004scan ACK Discovery - Failures Detected\n\n';
          }

          summary += `**Run:** ${new Date().toISOString().replace('T', ' ').slice(0, 19)} UTC\n\n`;

          // Parse JSON results for per-test status
          let testStatuses = new Map();
          try {
            const report = JSON.parse(fs.readFileSync('test-report.json', 'utf8'));
            for (const suite of report.suites || []) {
              for (const spec of suite.specs || []) {
                const status = spec.ok ? '\u2705' : '\u274c';
                testStatuses.set(spec.title, status);
              }
              for (const inner of suite.suites || []) {
                for (const spec of inner.specs || []) {
                  const status = spec.ok ? '\u2705' : '\u274c';
                  testStatuses.set(spec.title, status);
                }
              }
            }
          } catch (e) {
            console.log('Could not parse JSON report:', e.message);
          }

          // Find screenshots and build image references
          summary += '### Screenshots\n\n';

          if (fs.existsSync(testResultsDir)) {
            const dirs = fs.readdirSync(testResultsDir, { withFileTypes: true })
              .filter(d => d.isDirectory())
              .map(d => d.name)
              .sort();

            for (const dir of dirs) {
              const dirPath = path.join(testResultsDir, dir);
              const pngs = fs.readdirSync(dirPath).filter(f => f.endsWith('.png'));

              for (const png of pngs) {
                // Build the raw.githubusercontent.com URL
                const flatName = `${dir}--${png}`;
                const imgUrl = `https://raw.githubusercontent.com/${repo}/test-screenshots/${flatName}`;

                // Clean up test name from directory
                const testName = dir
                  .replace(/^8004scan-ACK-Discovery-/i, '')
                  .replace(/-chromium$/, '')
                  .replace(/-retry\d+$/, '')
                  .replace(/-/g, ' ');

                const status = testOutcome === 'success' ? '\u2705' : '\u2753';

                summary += `<details>\n<summary>${status} ${testName}</summary>\n\n`;
                summary += `![${testName}](${imgUrl})\n\n`;
                summary += `</details>\n\n`;
              }
            }
          } else {
            summary += '_No screenshots captured._\n\n';
          }

          // Test matrix table
          summary += '### Results\n\n';
          summary += '| Test | Status |\n';
          summary += '|------|--------|\n';

          const tests = [
            ['ACK appears in search results for all chains', 'Search results (all chains)'],
            ['ACK agent page loads on Abstract (abstract/606)', 'Agent page - Abstract (#606)'],
            ['ACK agent page loads on Base (base/19125)', 'Agent page - Base (#19125)'],
            ['ACK agent page loads on Ethereum (ethereum/26424)', 'Agent page - Ethereum (#26424)'],
            ['ACK is selectable from search results', 'Search \u2192 agent navigation'],
          ];

          for (const [specTitle, displayName] of tests) {
            const icon = testStatuses.get(specTitle) || (testOutcome === 'success' ? '\u2705' : '\u274c');
            summary += `| ${displayName} | ${icon} |\n`;
          }

          summary += '\n\ud83d\udcce Full traces and video available in artifacts below\n';

          fs.appendFileSync(summaryFile, summary);
          console.log(`Summary written (${(summary.length / 1024).toFixed(1)}KB)`);
          EOF

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 8004scan-discovery-report
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Handle failure - create or update issue
        if: steps.tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            const label = 'monitor-alert';
            const title = '8004scan Discovery Check Failing';

            // Parse test report for failure details
            const fs = require('fs');
            let failedTests = [];
            try {
              const report = JSON.parse(fs.readFileSync('test-report.json', 'utf8'));
              const extractFailures = (suites) => {
                for (const suite of suites) {
                  for (const spec of suite.specs || []) {
                    if (!spec.ok) failedTests.push(spec.title);
                  }
                  if (suite.suites) extractFailures(suite.suites);
                }
              };
              extractFailures(report.suites || []);
            } catch (e) {
              failedTests.push('(could not parse test report)');
            }

            // Build screenshot URLs
            const testResultsDir = 'test-results';
            let screenshots = '';
            if (fs.existsSync(testResultsDir)) {
              const dirs = fs.readdirSync(testResultsDir, { withFileTypes: true })
                .filter(d => d.isDirectory()).map(d => d.name);
              for (const dir of dirs) {
                const pngs = fs.readdirSync(`${testResultsDir}/${dir}`).filter(f => f.endsWith('.png'));
                for (const png of pngs) {
                  const flatName = `${dir}--${png}`;
                  const url = `https://raw.githubusercontent.com/${repo.owner}/${repo.repo}/test-screenshots/${flatName}`;
                  const name = dir.replace(/^8004scan-ACK-Discovery-/i, '').replace(/-chromium$/, '').replace(/-/g, ' ');
                  screenshots += `### ${name}\n![${name}](${url})\n\n`;
                }
              }
            }

            const body = [
              `## Discovery check failed`,
              ``,
              `**Run:** [#${context.runNumber}](https://github.com/${repo.owner}/${repo.repo}/actions/runs/${context.runId})`,
              `**Time:** ${new Date().toISOString()}`,
              ``,
              `### Failed Tests`,
              failedTests.map(t => `- \`${t}\``).join('\n'),
              ``,
              screenshots ? `### Screenshots\n\n${screenshots}` : '',
            ].join('\n');

            // Check for existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              ...repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });

            if (issues.length > 0) {
              // Comment on existing issue
              await github.rest.issues.createComment({
                ...repo,
                issue_number: issues[0].number,
                body: `## Still failing\n\n${body}`,
              });
              console.log(`Commented on existing issue #${issues[0].number}`);
            } else {
              // Create new issue
              // Ensure label exists
              try {
                await github.rest.issues.createLabel({
                  ...repo,
                  name: label,
                  color: 'e11d48',
                  description: '8004scan monitor alert',
                });
              } catch (e) {
                // Label already exists, fine
              }

              const { data: issue } = await github.rest.issues.create({
                ...repo,
                title,
                body,
                labels: [label],
              });
              console.log(`Created issue #${issue.number}`);
            }

      - name: Handle recovery - close issue
        if: steps.tests.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            const label = 'monitor-alert';

            const { data: issues } = await github.rest.issues.listForRepo({
              ...repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                ...repo,
                issue_number: issues[0].number,
                body: `## \u2705 Recovered\n\nAll tests passing again as of [run #${context.runNumber}](https://github.com/${repo.owner}/${repo.repo}/actions/runs/${context.runId}).\n\nClosing automatically.`,
              });
              await github.rest.issues.update({
                ...repo,
                issue_number: issues[0].number,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`Closed issue #${issues[0].number} - tests recovered`);
            }

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
