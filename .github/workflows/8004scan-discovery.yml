name: 8004scan ACK Discovery

on:
  schedule:
    - cron: '15 8,20 * * *' # Twice daily: 8:15 and 20:15 UTC (1:15am / 1:15pm MST)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discovery-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run 8004scan discovery tests
        id: tests
        continue-on-error: true
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-report.json
        run: npx playwright test tests/8004scan-discovery.spec.ts --config=playwright.external.config.ts --reporter=list,json

      - name: Generate visual job summary
        if: always()
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const summaryFile = process.env.GITHUB_STEP_SUMMARY;
          const testResultsDir = 'test-results';
          const testOutcome = '${{ steps.tests.outcome }}';

          let summary = '';

          // Header
          if (testOutcome === 'success') {
            summary += '## ✅ 8004scan ACK Discovery - All Checks Passed\n\n';
          } else {
            summary += '## ❌ 8004scan ACK Discovery - Failures Detected\n\n';
          }

          summary += `**Run:** ${new Date().toISOString().replace('T', ' ').slice(0, 19)} UTC\n\n`;

          // Parse JSON results for per-test status
          let testStatuses = new Map();
          try {
            const report = JSON.parse(fs.readFileSync('test-report.json', 'utf8'));
            for (const suite of report.suites || []) {
              for (const spec of suite.specs || []) {
                const status = spec.ok ? '✅' : '❌';
                testStatuses.set(spec.title, status);
              }
              // Handle nested suites
              for (const inner of suite.suites || []) {
                for (const spec of inner.specs || []) {
                  const status = spec.ok ? '✅' : '❌';
                  testStatuses.set(spec.title, status);
                }
              }
            }
          } catch (e) {
            console.log('Could not parse JSON report:', e.message);
          }

          // Find and embed screenshots
          summary += '### Screenshots\n\n';

          if (fs.existsSync(testResultsDir)) {
            const dirs = fs.readdirSync(testResultsDir, { withFileTypes: true })
              .filter(d => d.isDirectory())
              .map(d => d.name)
              .sort();

            for (const dir of dirs) {
              const dirPath = path.join(testResultsDir, dir);
              const pngs = fs.readdirSync(dirPath).filter(f => f.endsWith('.png'));

              for (const png of pngs) {
                const imgPath = path.join(dirPath, png);
                const stats = fs.statSync(imgPath);

                // GitHub supports up to 1MB embedded images in summaries
                if (stats.size > 1_000_000) {
                  summary += `> ⚠️ Screenshot too large to embed: \`${dir}/${png}\` (${(stats.size / 1024).toFixed(0)}KB)\n\n`;
                  continue;
                }

                const imgData = fs.readFileSync(imgPath);
                const base64 = imgData.toString('base64');

                // Clean up test name from directory
                const testName = dir
                  .replace(/^8004scan-ACK-Discovery-/i, '')
                  .replace(/-chromium$/, '')
                  .replace(/-/g, ' ');

                const status = testOutcome === 'success' ? '✅' : '❓';

                summary += `<details>\n<summary>${status} ${testName}</summary>\n\n`;
                summary += `![${testName}](data:image/png;base64,${base64})\n\n`;
                summary += `</details>\n\n`;
              }
            }
          } else {
            summary += '_No screenshots captured._\n\n';
          }

          // Test matrix table
          summary += '### Results\n\n';
          summary += '| Test | Status |\n';
          summary += '|------|--------|\n';

          const tests = [
            ['ACK appears in search results for all chains', 'Search results (all chains)'],
            ['ACK agent page loads on Abstract (abstract/606)', 'Agent page - Abstract (#606)'],
            ['ACK agent page loads on Base (base/19125)', 'Agent page - Base (#19125)'],
            ['ACK agent page loads on Ethereum (ethereum/26424)', 'Agent page - Ethereum (#26424)'],
            ['ACK is selectable from search results', 'Search → agent navigation'],
          ];

          for (const [specTitle, displayName] of tests) {
            const icon = testStatuses.get(specTitle) || (testOutcome === 'success' ? '✅' : '❌');
            summary += `| ${displayName} | ${icon} |\n`;
          }

          summary += '\n📎 Full traces and video available in artifacts below\n';

          fs.appendFileSync(summaryFile, summary);
          console.log(`Summary written (${(summary.length / 1024).toFixed(1)}KB)`);
          EOF

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 8004scan-discovery-report
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
